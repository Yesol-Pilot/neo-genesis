<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --line: #d9dee8;
      --text: #172033;
      --muted: #637083;
      --green: #117a43;
      --green-bg: #e8f6ee;
      --yellow: #946200;
      --yellow-bg: #fff3cf;
      --red: #b42318;
      --red-bg: #fee4e2;
      --neutral: #475467;
      --neutral-bg: #eef2f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Noto Sans KR", sans-serif;
      line-height: 1.45;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }
    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; line-height: 1.2; letter-spacing: 0; }
    h2 { font-size: 16px; margin-bottom: 10px; letter-spacing: 0; }
    h3 { font-size: 14px; margin-bottom: 6px; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      font-weight: 700;
      border: 1px solid currentColor;
    }
    .green { color: var(--green); background: var(--green-bg); }
    .yellow { color: var(--yellow); background: var(--yellow-bg); }
    .red { color: var(--red); background: var(--red-bg); }
    .neutral { color: var(--neutral); background: var(--neutral-bg); }
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .summary-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      min-height: 86px;
      background: #fbfcfe;
    }
    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .value { font-size: 14px; overflow-wrap: anywhere; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      vertical-align: top;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      overflow-wrap: anywhere;
    }
    th { color: var(--muted); font-weight: 700; background: #fbfcfe; }
    ul {
      padding-left: 18px;
      margin: 0;
    }
    li + li { margin-top: 6px; }
    code {
      font-family: Consolas, "Courier New", monospace;
      background: #eef2f7;
      border-radius: 4px;
      padding: 1px 4px;
      font-size: 12px;
    }
    .empty {
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 860px) {
      header, .summary { grid-template-columns: 1fr; }
      .span-8, .span-6, .span-4 { grid-column: span 12; }
      main { width: min(100vw - 20px, 1180px); padding-top: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>{{title}}</h1>
        <p class="meta">{{generated_at}} · {{run_kind}} · {{run_id}}</p>
      </div>
      <div class="badge {{status_class}}">{{verdict_label}}</div>
    </header>
    {{body}}
  </main>
  <script id="decision-artifact" type="application/json">{{artifact_json}}</script>
</body>
</html>
