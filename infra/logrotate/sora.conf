# Sora logrotate (W6 Stop/Go S6 disk full 강화)
# 2026-05-06 박제 — Claude Opus 4.7 자율
#
# 적용: ysh-server host 의 /etc/logrotate.d/sora 로 cp
# (컨테이너 내부 /app/logs/* 는 supervisord stdout_logfile_maxbytes=10MB 로 이미 회전 중,
#  아래 규칙은 추가적으로 host bind mount /home/ysh/sora/data/logs/* 의 외부 회전 보강)
#
# 검증: sudo logrotate -d /etc/logrotate.d/sora  (dry-run)
#       sudo logrotate -f /etc/logrotate.d/sora  (강제 실행)

/home/ysh/sora/data/logs/*.log {
    # 일 단위 + 50MB 도달 시 회전
    daily
    size 50M
    # 14일 보존 (D9 PIPA: audit 3년이지만 daemon log 는 별도 14일)
    rotate 14
    # 즉시 .gz 압축
    compress
    delaycompress
    # 빈 파일 회전 안 함
    notifempty
    # 누락 파일 무시 (logrotate fail 안 됨)
    missingok
    # 컨테이너가 file handle 잡고 있으므로 truncate 대신 copytruncate
    copytruncate
    # 권한 유지
    create 0644 root root
}

/home/ysh/sora/data/logs/*.jsonl {
    # JSONL audit log 는 30일 보존 (PIPA Telegram 180일 별도 정책 — sora_audit.jsonl 은
    #  data_retention_enforcer cron 이 별도로 처리하므로 logrotate 는 fallback)
    daily
    size 100M
    rotate 30
    compress
    delaycompress
    notifempty
    missingok
    copytruncate
    create 0644 root root
}
