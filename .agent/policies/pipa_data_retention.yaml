# PIPA (개인정보보호법) Compliance + Data Retention Policy
# Master: 20260428_SORA_ENTERPRISE_GRADE_MASTER_v1.md (W9)
# Decisions: 20260428_SORA_ENTERPRISE_DECISIONS_v1.md (D9 PIPA 보존기간)
# Owner: 허예솔 (Sora 단일 사용자 single-tenant)
# Adopted: 2026-05-04

version: 1
ssot_revision: "auto-tracked-on-bump"
review_cadence: quarterly  # 분기별 owner 검토
last_review: "2026-05-04"

# ============================================================
# PIPA 11개 기본 항목 매핑 (개인정보보호법 §15-19, §21-22)
# ============================================================
pipa_articles:
  # 수집·이용
  article_15_collection:
    description: "개인정보 수집·이용 (동의 / 법적 근거)"
    sora_compliance: "owner 본인 = 1인 single-tenant. 본인 정보만 수집, 외부 동의 불필요."
    audit_required: true

  article_17_provision:
    description: "개인정보 제3자 제공"
    sora_compliance: "외부 제공 NONE. 모든 데이터 owner 본인 fleet 안에 보관."
    audit_required: true

  article_19_purpose:
    description: "수집 목적 외 이용·제공 제한"
    sora_compliance: "telegram 메시지는 owner-bot 대화에만 사용. 다른 SBU 와 cross-share 금지."
    audit_required: true

  # 보존·파기
  article_21_retention:
    description: "개인정보 파기 (보존기간 경과 시)"
    sora_compliance: "data_categories 의 retention_days 기준 자동 만료 cron"
    audit_required: true
    enforcer_script: "scripts/data_retention_enforcer.py"

  article_22_consent:
    description: "동의 철회"
    sora_compliance: "owner 'forget X' 명령 → 즉시 삭제"

# ============================================================
# 데이터 카테고리별 보존기간 (D9 결정 박제)
# ============================================================
data_categories:
  # 1. Telegram 대화 — 6개월 (owner 명시 후 5년 까지 연장 가능)
  telegram_messages:
    description: "owner ↔ sora 텔레그램 대화 (assistant_memory)"
    location: "/app/data/assistant_memory/memory.json"
    retention_days: 180
    auto_purge: true
    pii_level: "high"  # owner 본인 사실 / 음성 / 가족 정보 가능
    review_action: "180일 초과 메시지 archive 또는 delete (owner 결정)"

  # 2. Audit log — 3년 (sora 운영 분석 + 문제 추적)
  audit_log:
    description: "sora_audit.jsonl — request_id / user_message / strategy / duration"
    location: "/app/data/logs/sora_audit.jsonl"
    retention_days: 1095  # 3년
    auto_purge: true
    pii_level: "medium"
    rotation: "monthly"  # 월 단위 file rotation

  # 3. RAG corpus — 5년 (장기 지식 자산)
  rag_corpus:
    description: "Qdrant collections (neo_ssot/code/paper/notes/quant)"
    location: "ysh-server: /home/ysh/qdrant_data"
    retention_days: 1825  # 5년
    auto_purge: false  # owner 수동 정리. 자동 purge 비활성
    pii_level: "low"  # SSOT / 공개 자료 위주
    forgotten_uri_table: "rag_v2.forgotten_uris"  # right-to-be-forgotten 처리

  # 4. Personal directory — 동의 기반 (자동 만료 X)
  personal:
    description: "personal/ 디렉토리 (법무/금융/개인회생 서류)"
    location: "D:/00.test/personal/"
    retention_days: -1  # 무한 (owner 명시 삭제만)
    auto_purge: false
    pii_level: "critical"  # 주민번호 / 금융 / 의료 등
    access_log_required: true  # 모든 read/write 기록

  # 5. SLO log — 2년 (운영 분석)
  slo_log:
    description: "sora_slo_log.jsonl — endpoint / sli / violation 기록"
    location: "/app/data/logs/slo_log.jsonl"
    retention_days: 730
    auto_purge: true
    pii_level: "none"
    rotation: "weekly"

  # 6. Alerts log — 1년
  alerts_log:
    description: "alerts.jsonl — P0/P1/P2/P3 alert dispatch 기록"
    location: "/app/data/logs/alerts.jsonl"
    retention_days: 365
    auto_purge: true
    pii_level: "low"

  # 7. brain.log / brain_err.log — 30일
  brain_log:
    description: "brain.worker / sora_engine 운영 로그"
    location: "/app/data/logs/brain*.log*"
    retention_days: 30
    auto_purge: true
    pii_level: "low"
    rotation: "size_based"  # logrotate 기반

  # 8. ChatExport / Telegram Desktop 백업 — 90일
  chat_export:
    description: "Telegram Desktop ChatExport (BotFather DM 등)"
    location: "C:/Users/yesol/Downloads/Telegram Desktop/ChatExport_*"
    retention_days: 90
    auto_purge: false  # owner 수동 (Windows 측, 컨테이너 외)
    pii_level: "high"

# ============================================================
# Right-to-be-forgotten (PIPA 22조 — 동의 철회)
# ============================================================
right_to_be_forgotten:
  enabled: true
  trigger: "owner 'forget <topic>' 명령"
  scope:
    - "assistant_memory.json — 해당 conversations entries 삭제"
    - "rag_corpus — Qdrant 의 source_uri 매칭 chunks 삭제 + forgotten_uris 등록"
    - "audit_log — 해당 request_id row 삭제"
  audit_log_required: true  # 삭제 자체도 audit 에 기록 (역설적이지만 PIPA 22조 준수 증거)

# ============================================================
# Access Matrix (RAG ↔ Sora ↔ owner 디바이스)
# ============================================================
access_matrix:
  owner_devices:
    - device: "desktop-sol01"
      access: "all"  # owner 본인 PC
    - device: "desktop-yesol"
      access: "read-only"  # 회사 PC, secret/personal 차단
      excluded_categories: ["personal", "rag_corpus.secret"]
    - device: "ysh-server"
      access: "all"  # sora-live 본체
    - device: "mobile (s26-ultra / tab-s10-ultra)"
      access: "approval-only"  # 모바일 승인 plane, secret 보유 금지

  agents:
    - agent: "sora_engine"
      access: "all (owner-only)"
    - agent: "claude-code"
      access: "code + ssot (personal 제외)"
    - agent: "codex"
      access: "code + ssot (personal 제외)"
    - agent: "gemini-cli"
      access: "research only"

# ============================================================
# 자동 enforcement
# ============================================================
enforcement:
  cron_schedule: "0 4 * * *"  # 매일 04:00 KST
  script: "/app/scripts/data_retention_enforcer.py"
  dry_run_default: false  # 실 삭제 활성
  notification:
    on_purge: false  # routine 작업이라 owner 알림 안 함
    on_error: true   # 에러 시 telegram alert

  # Stop conditions (안전 게이트)
  safety:
    max_purge_per_run: 1000  # 한 cycle 에 1000개 이상 삭제 시 중단
    require_owner_confirm:
      - "personal"  # 절대 자동 purge 안 함
      - "rag_corpus"  # 자동 purge 비활성

# ============================================================
# Audit trail
# ============================================================
audit:
  log_file: "/app/data/logs/data_retention_audit.jsonl"
  schema:
    - timestamp: "TIMESTAMPTZ"
    - category: "TEXT"  # data_categories key
    - action: "TEXT"  # purge / archive / forgotten_request
    - count: "INTEGER"  # 영향받은 row 수
    - dry_run: "BOOLEAN"
    - error: "TEXT (nullable)"
  retention: "permanent"  # audit log 자체는 영구 보존 (PIPA 입증용)
