# Neo Genesis Ontology v0.4 -- Neo4j Community Edition + n10s (RDF export)
#
# Per G1-8 (Store paradigm: v0.4 Neo4j Community). DESIGN §10 / §14.
#
# Startup:
#   cd .agent/ontology/neo4j
#   docker compose up -d
#   # Browser: http://localhost:7474
#   # Bolt:    bolt://localhost:7687  (user=neo4j, pwd from .env)
#
# Migration after startup:
#   python scripts/ontology/migrate_to_neo4j.py --import-nodes --import-edges
#
# Verification:
#   python scripts/ontology/migrate_to_neo4j.py --verify
#
# Rollback to DuckDB:
#   docker compose down
#   # DuckDB on JSONL is still primary (this is dual-write phase)

version: "3.8"

services:
  neo4j:
    image: neo4j:5-community
    container_name: neo-genesis-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme-set-via-env}
      - NEO4J_PLUGINS=["apoc", "n10s"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./import:/var/lib/neo4j/import
      - ./plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1"]
      interval: 15s
      timeout: 30s
      retries: 10
