# Neo-Genesis CI/CD 파이프라인
#
# 트리거: main 브랜치 push 또는 Pull Request
# 단계:
#   1. 테스트 (52개 + 텔레메트리 테스트)
#   2. Docker 이미지 빌드 검증
#   3. OCI 서버 SSH 배포 (main push만)

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────
  # 1단계: 테스트
  # ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # MailHog 서비스 (이메일 E2E 테스트용)
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: 단위 테스트 실행
        run: |
          python -m pytest tests/test_email_pipeline.py tests/test_blog_pipeline.py -v --tb=short

      - name: RiskEngine 레드티밍 테스트
        run: |
          python -m pytest tests/test_e2e_pipeline.py -k "RedTeam" -v --tb=short

      - name: MailHog E2E 테스트
        env:
          MAILHOG_SMTP_HOST: localhost
          MAILHOG_SMTP_PORT: 1025
          MAILHOG_API_URL: http://localhost:8025/api/v2/messages
        run: |
          python -m pytest tests/test_e2e_pipeline.py -k "MailHog" -v --tb=short

  # ──────────────────────────────────────────
  # 2단계: Docker Compose 구문 검증
  # ──────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose 구문 검증
        run: |
          # secrets 파일 더미 생성 (검증용)
          mkdir -p infra/secrets
          echo "dummy" > infra/secrets/db_password.txt
          echo "dummy" > infra/secrets/n8n_auth_password.txt
          echo "dummy" > infra/secrets/grafana_password.txt
          docker compose -f infra/docker-compose.prod.yml config --quiet

  # ──────────────────────────────────────────
  # 3단계: OCI 서버 자동 배포 (main push만)
  # ──────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [test, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: OCI 서버 SSH 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /opt/neo-genesis
            git pull origin main
            cd infra
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f
            echo "배포 완료: $(date)"
