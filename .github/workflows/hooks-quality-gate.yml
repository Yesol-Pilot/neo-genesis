name: Claude Hooks Quality Gate

# Claude Code 9-hook 회귀 가드 (Phase A Closeout, 2026-05-08 박제)
# Master: .agent/shared-brain/handoff.md → 5/8 Persona Phase A
# 실행 환경: Windows runner 필요 (PowerShell hook). owner G2 게이트 통과 후 활성.
#
# 활성화 조건 (owner 결정 박제):
#   - Windows GitHub Actions runner 가격 검토 (Linux 의 ~2배)
#   - hook 변경 빈도 vs 자동화 ROI
#   - 현 시점 (2026-05-10) 라이브 20/20 PASS 박제 → 활성 보류, 설계만 박제

on:
  workflow_dispatch:
    # owner manual trigger only (현 시점 default)
  # 향후 활성화 시 아래 주석 해제:
  # pull_request:
